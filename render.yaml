services:
  - type: web
    name: forex-signal-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # RENDER_EXTERNAL_URL is auto-injected by Render for every web
      # service — do not declare it manually, that overrides the real one.
